# ============================================================
# Knospe - Docker-Compose-Stack (Entwicklung)
# ============================================================
# Drei Dienste: php (JSON-API), postgres (Datenbank), node (Vite-Frontend).
# Projektname, Host-Ports und Zugangsdaten kommen aus der .env, damit sich
# zwei Installationen nie stören. Container-intern bleiben die Ports fest.
# Lern mehr: docs/06-deployment/01-docker-compose-detailliert.md
name: ${COMPOSE_PROJECT_NAME:-knospe}

services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /app/backend
    # Eingebauter PHP-Server; index.php dient als Router (alle Anfragen laufen durch).
    command: php -S 0.0.0.0:8000 -t public public/index.php
    volumes:
      - ./:/app
    ports:
      - "${PHP_PORT:-8000}:8000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_SECRET: ${APP_SECRET:-}
      # Im Docker-Netz erreicht das Backend die Datenbank über den Servicenamen.
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-knospe}
      DB_USER: ${POSTGRES_USER:-knospe}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-knospe}
    extra_hosts:
      # Für Xdebug unter Linux; unter macOS/Windows ohnehin vorhanden.
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-knospe}
      POSTGRES_USER: ${POSTGRES_USER:-knospe}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-knospe}
    ports:
      - "${DB_PORT:-15432}:5432"
    volumes:
      # Benanntes Volume (kein Bind-Mount): persistent und macOS-sicher.
      # Der Name wird durch den eindeutigen Projektnamen automatisch eindeutig.
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-knospe} -d ${POSTGRES_DB:-knospe}"]
      interval: 3s
      timeout: 3s
      retries: 20

  node:
    image: node:20-alpine
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./:/app
    ports:
      - "${VITE_PORT:-5173}:5173"
    environment:
      # Ziel des Vite-Dev-Proxys für /api (Servicename im Docker-Netz).
      API_PROXY_TARGET: http://php:8000
    depends_on:
      - php

volumes:
  pgdata:
